name: emergency_assistant
description: Multilingual Emergency Triage Assistant

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.0

  # Audio recording & playback
  record: ^5.1.0
  audioplayers: ^6.0.0

  # State
  provider: ^6.1.1

  # Permissions
  permission_handler: ^11.3.0

  # Utilities
  path_provider: ^2.1.2
  intl: ^0.19.0

  # Image picker (camera & gallery)
  image_picker: ^1.1.2

  # Location
  geolocator: ^11.1.0

  # Phone call & external links
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
